spring:
  application:
    name: billing-invoice

  cloud:
    config:
      enabled: false

  datasource:
    url: jdbc:postgresql://149.56.107.189:5432/db_formation
    username: root
    password: eSFHR9u2mbBVLLDJtSG3
    driver-class-name: org.postgresql.Driver
    cache: false

  flyway:
    enabled: true
    schemas: invoice
    default-schema: invoice
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        # Retry automatique avant envoi en DLQ
        retry:
          enabled: true
          initial-interval: 2000    # 2s avant 1er retry
          multiplier: 2             # backoff exponentiel
          max-attempts: 3           # 3 tentatives max
          max-interval: 10000       # plafond 10s
        acknowledge-mode: auto     # nack automatique en cas d'exception

app:
  feign-client:
    reference-service:
      name: reference-service
      url: http://localhost:8080
      path: /api/ref/{id}